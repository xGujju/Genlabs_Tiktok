# Variety enforcement rules read by the production layer
variety_rules:
  max_posts_per_avatar_per_day: 2
  max_posts_per_format_per_day: 3
  max_posts_per_primary_tool_per_day: 1
  cooldown_days_topic_angle_pair: 30
  cooldown_similarity_threshold: 0.85
  required_avatar_coverage_per_week: 5   # all 5 launch avatars must get ≥1 post/week

# Output mix targets (per week, soft guidance for the format-router)
weekly_format_mix:
  carousel_sketchnote: 0.40
  screen_recording_voiceover: 0.25
  before_after_split: 0.10
  quote_card: 0.10
  talking_head: 0.10   # batch-recorded; system schedules across week
  customer_qa_reply: 0.05

# Hook-frame mix targets (per week)
weekly_hook_mix:
  tutorial_numbered: 0.25
  story_character: 0.20
  curiosity_gap: 0.15
  mistake_confession: 0.15
  day_in_life: 0.10
  controversy_pov: 0.10
  customer_question: 0.05
